version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: primetrade_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - prime_network

  database-gui:
    image: mongo-express
    container_name: primetrade_mongo_gui
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
    depends_on:
      - mongodb
    networks:
      - prime_network

  prime-backend:
    build: ./backend
    container_name: primetrade_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/prime_backend
      - JWT_SECRET=super_secret_gigflow_jwt_key_2026
      - JWT_EXPIRE=30d
      - NODE_ENV=development
    depends_on:
      - mongodb
    networks:
      - prime_network
    volumes:
      - ./backend:/app
      - /app/node_modules

volumes:
  mongo-data:

networks:
  prime_network:
    driver: bridge
